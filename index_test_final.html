<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D9 Test Final</title>
  <link rel="stylesheet" href="styles_test_final.css" />
</head>
<body>
  <main class="phone">
    <section class="shell">
      <header class="hero-header">
        <div class="brand-left">
          <div class="logo-badge">
            <img src="logo_d9.png" alt="Logo D9" />
          </div>
          <div class="brand-copy">
            <h1>Distribuidora 9</h1>
            <p>Gestor de pedidos</p>
          </div>
        </div>
      </header>

      <section class="status-row">
        <button class="status-pill online" type="button">
          <span class="dot"></span>
          <span>Online</span>
        </button>

        <button class="status-pill" type="button">
          <span class="status-icon">👥</span>
          <span>Modo invitado</span>
        </button>

        <button class="status-pill pancko-pill" type="button">
          <span class="status-icon">🎧</span>
          <span class="pancko-text">Pancko</span>
        </button>
      </section>

      <button class="cta-main" type="button">
        <span class="cta-icon">🛒</span>
        <span class="cta-copy">
          <strong>GENERAR PEDIDO</strong>
          <small>Cliente, productos y envío</small>
        </span>
        <span class="cta-arrow">›</span>
      </button>

      <section class="promo-card" aria-label="Carrusel demo">
        <div class="promo-overlay"></div>

        <div class="promo-copy">
          <span class="promo-tag">PROMO</span>
          <h2>OFERTAS <span>DE LA</span><br />SEMANA</h2>
          <p>Autoslide, swipe y promos claras desde Sheets.</p>

          <div class="promo-price">
            <span class="price-box">$ 1.250</span>
            <span class="price-label">c/u</span>
          </div>
        </div>

        <div class="promo-art">
          <div class="beam beam-a"></div>
          <div class="beam beam-b"></div>

          <div class="product product-red"></div>
          <div class="product product-blue"></div>
          <div class="product product-front"></div>
        </div>
      </section>

      <section class="grid-actions">
        <button class="action-card" type="button">
          <span class="action-head">
            <span class="icon-wrap blue">🏷</span>
            <span class="title-group">
              <strong>Lista de precios</strong>
              <small>Consultar categorías y precios</small>
            </span>
          </span>
          <span class="go">›</span>
        </button>

        <button class="action-card" type="button">
          <span class="action-head">
            <span class="icon-wrap cyan">🕘</span>
            <span class="title-group">
              <strong>Historial</strong>
              <small>Pedidos guardados en este celular</small>
            </span>
          </span>
          <span class="go">›</span>
        </button>

        <button class="action-card" type="button">
          <span class="action-head">
            <span class="icon-wrap soft">👤</span>
            <span class="title-group">
              <strong>Usuario</strong>
              <small>Sesión actual y acceso</small>
            </span>
          </span>
          <span class="go">›</span>
        </button>

        <button class="action-card pending-card" type="button">
          <span class="action-head">
            <span class="icon-wrap warm">📋</span>
            <span class="title-group">
              <strong>Pendientes</strong>
              <small>Reintentar registros</small>
            </span>
          </span>
          <span class="badge">3</span>
          <span class="go">›</span>
        </button>
      </section>

      <section class="led-info">
        <div class="led-row">
          <div class="led-live"><span class="live-dot"></span>EN VIVO</div>
          <div class="led-divider"></div>
          <div class="led-marquee-wrap">
            <div class="led-marquee">
              <span>🚚 Repartos hasta las 18hs</span>
              <span>•</span>
              <span>🏷 Promos activas</span>
              <span>•</span>
              <span>📍 Zona sur sin envío hoy</span>
              <span>•</span>
              <span>📦 Combos destacados en lácteos y almacén</span>
            </div>
          </div>
          <div class="led-divider"></div>
          <div class="led-end">🏷</div>
        </div>
      </section>
    </section>
  </main>

  <script src="app_test_final.js"></script>
</body>
</html>
