<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cards Pancko</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="grid">

  <div class="card" onclick="goPrecios()">
    <div class="card-icon icon-precios">🏷️</div>
    <div class="card-text">
      <div class="card-title">Lista de precios</div>
      <div class="card-sub">Consultar categorías y precios</div>
    </div>
    <div class="card-arrow">›</div>
  </div>

  <div class="card" onclick="goHistorial()">
    <div class="card-icon icon-historial">🕒</div>
    <div class="card-text">
      <div class="card-title">Historial</div>
      <div class="card-sub">Pedidos guardados</div>
    </div>
    <div class="card-arrow">›</div>
  </div>

  <div class="card" onclick="goUsuario()">
    <div class="card-icon icon-usuario">👤</div>
    <div class="card-text">
      <div class="card-title">Usuario</div>
      <div class="card-sub">Sesión actual y acceso</div>
    </div>
    <div class="card-arrow">›</div>
  </div>

  <div class="card" onclick="goPendientes()" style="position:relative;">
    <div class="card-icon icon-pendientes">📋</div>
    <div class="card-text">
      <div class="card-title">Pendientes</div>
      <div class="card-sub">Reintentar registros</div>
    </div>
    <div class="card-arrow">›</div>
    <div class="badge" id="badgePendientes">3</div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
